<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>简历管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // Zeabur 部署后通过环境变量 VITE_OPTIMIZER_URL / VITE_GENERATOR_URL 配置
  var OPTIMIZER_URL = "%VITE_OPTIMIZER_URL%".replace(/^%.+%$/,"") || "http://localhost:5173";
  var GENERATOR_URL = "%VITE_GENERATOR_URL%".replace(/^%.+%$/,"") || "http://localhost:3000";
</script>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Inter", system-ui, sans-serif;
    background: rgb(2, 8, 23);
    color: rgb(248, 250, 252);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    width: 100%;
    max-width: 1152px;
    padding: 2rem 1.5rem;
    margin: 1.5rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3rem;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(168, 85, 247, 0.3));
    color: rgb(248, 250, 252);
  }

  .header h1 {
    font-size: 1.125rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.625rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(31, 41, 55, 0.5);
    border: 1px solid rgb(55, 65, 81);
    color: rgb(209, 213, 219);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgb(74, 222, 128);
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 4rem;
    padding: 0 1rem;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.8125rem;
    font-weight: 500;
    background: rgba(168, 85, 247, 0.15);
    color: rgb(192, 132, 252);
    border: 1px solid rgba(168, 85, 247, 0.3);
    margin-bottom: 1.5rem;
  }

  .hero h2 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .hero p {
    color: rgb(156, 163, 175);
    font-size: 1.0625rem;
    line-height: 1.6;
    max-width: 560px;
    margin: 0 auto;
  }

  /* Grid */
  .modules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 896px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    display: flex;
    flex-direction: column;
    background: rgba(31, 41, 55, 0.5);
    border: 1px solid rgb(55, 65, 81);
    border-radius: 10px;
    padding: 1.75rem;
    cursor: pointer;
    transition: background 200ms, border-color 200ms;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    position: relative;
  }

  .card:hover {
    background: rgba(31, 41, 55, 0.7);
    border-color: rgb(75, 85, 99);
  }

  .card-icon-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgb(55, 65, 81);
    background: rgba(31, 41, 55, 0.5);
    transition: background 200ms;
  }

  .card:nth-child(1) .card-icon {
    color: rgb(96, 165, 250);
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(59, 130, 246, 0.3);
  }

  .card:nth-child(2) .card-icon {
    color: rgb(192, 132, 252);
    background: rgba(168, 85, 247, 0.15);
    border-color: rgba(168, 85, 247, 0.3);
  }

  .card h3 {
    font-size: 1.0625rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card > p {
    color: rgb(156, 163, 175);
    font-size: 0.875rem;
    line-height: 1.6;
    margin-bottom: 1.25rem;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-top: 1rem;
    border-top: 1px solid rgb(55, 65, 81);
    margin-top: auto;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.625rem;
    border-radius: 6px;
    font-size: 0.8125rem;
    font-weight: 500;
    background: rgba(31, 41, 55, 0.5);
    border: 1px solid rgb(55, 65, 81);
    transition: all 200ms;
  }

  .card:nth-child(1) .card-tag {
    color: rgb(147, 197, 253);
    border-color: rgba(59, 130, 246, 0.3);
  }

  .card:nth-child(2) .card-tag {
    color: rgb(196, 181, 253);
    border-color: rgba(168, 85, 247, 0.3);
  }

  .card-footer-arrow {
    margin-left: auto;
    color: rgb(75, 85, 99);
    transition: color 200ms, transform 200ms;
  }

  .card:hover .card-footer-arrow {
    color: rgb(209, 213, 219);
    transform: translateX(3px);
  }

  /* Bottom bar (like the template's gradient section) */
  .bottom-bar {
    margin-top: 3rem;
    max-width: 896px;
    margin-left: auto;
    margin-right: auto;
    background: linear-gradient(to right, rgba(59, 130, 246, 0.15), rgba(168, 85, 247, 0.15));
    border: 1px solid rgb(55, 65, 81);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .bottom-bar p {
    color: rgb(156, 163, 175);
    font-size: 0.8125rem;
  }

  .bottom-bar-links {
    display: flex;
    gap: 1.25rem;
  }

  .bottom-bar-links a {
    color: rgb(107, 114, 128);
    font-size: 0.8125rem;
    text-decoration: none;
    transition: color 200ms;
  }

  .bottom-bar-links a:hover {
    color: rgb(209, 213, 219);
  }

  @media (max-width: 640px) {
    .page {
      padding: 1rem;
      margin: 0.5rem;
    }
    .modules-grid {
      grid-template-columns: 1fr;
    }
    .hero h2 {
      font-size: 1.75rem;
    }
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .bottom-bar {
      flex-direction: column;
      gap: 0.75rem;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <h1>简历管理</h1>
    </div>
    <span class="status-tag">
      <span class="status-dot"></span>
      就绪
    </span>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      轻松管理
    </div>
    <h2>选择简历处理方式</h2>
    <p>导入已有简历或从零开始创建，两种方式任你选择</p>
  </div>

  <!-- Modules -->
  <div class="modules-grid">
    <!-- 我有简历 -->
    <div class="card" role="button" tabindex="0" onclick="window.location.href=OPTIMIZER_URL">
      <div class="card-icon-row">
        <div class="card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h3>我有简历</h3>
      </div>
      <p>上传你已有的简历文件，使用 AI 智能分析并优化排版，让简历更具竞争力。</p>
      <div class="card-footer">
        <span class="card-tag">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          简历优化助手
        </span>
        <span class="card-footer-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- 没有简历 -->
    <div class="card" role="button" tabindex="0" onclick="window.location.href=GENERATOR_URL">
      <div class="card-icon-row">
        <div class="card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <h3>没有简历</h3>
      </div>
      <p>从零开始创建一份专业简历，通过步骤引导，轻松打造属于你的精彩履历。</p>
      <div class="card-footer">
        <span class="card-tag">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          简历生成助手
        </span>
        <span class="card-footer-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </div>
    </div>
  </div>

  <!-- Bottom bar (gradient section like the template) -->
  <div class="bottom-bar">
    <p>支持 PDF、DOCX 格式 &middot; 安全加密传输</p>
    <div class="bottom-bar-links">
      <a href="#" onclick="event.preventDefault()">隐私政策</a>
      <a href="#" onclick="event.preventDefault()">使用条款</a>
      <a href="#" onclick="event.preventDefault()">帮助</a>
    </div>
  </div>
</div>

</body>
</html>
